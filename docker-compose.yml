services:
  db:
    # pgvector/pgvector:pg16 — same Postgres 16 as before (postgres:16-alpine),
    # just with the pgvector extension pre-built in. No alpine tag exists for
    # this image (checked directly), so this is Debian-based; the data volume
    # format is unaffected either way. Needed for the rules/session-chronicle
    # retrieval migration off ChromaDB — see design.md's Tech Stack table and
    # the 2026-07-12 migration plan for why (Chroma's own local vector index
    # needed ~2.6GB resident just to query a 441k-row collection, independent
    # of any BM25/keyword-index work; pgvector consolidates vector + keyword
    # search onto the one DB this app already uses for everything else).
    image: pgvector/pgvector:pg16
    environment:
      # Local-dev-only credentials — this stack only ever binds to localhost.
      # Use real secrets (env vars / a secrets manager) for any non-local deploy.
      POSTGRES_DB: dnd_dm
      POSTGRES_USER: dnd_dm
      POSTGRES_PASSWORD: dnd_dm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dnd_dm"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://dnd_dm:dnd_dm@db:5432/dnd_dm
      # Ollama no longer serves anything in the live app's runtime path as of
      # the vLLM-metal embeddings migration (vllm-migration-plan.md §7.7) —
      # chat AND embeddings both moved to vLLM-metal. Still reachable here
      # for offline scripts (extract_entities.py etc, out of scope for both
      # migrations) and the manual break-glass fallback (see the plan's §6).
      # On Linux: set OLLAMA_BASE_URL=http://172.17.0.1:11434 or use host network mode.
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      # vLLM-metal chat server (see vllm-migration-plan.md) — runs natively
      # on the host Mac (not in Docker), same reachability pattern as Ollama
      # above. On Linux: same 172.17.0.1/host-network-mode note applies.
      VLLM_BASE_URL: http://host.docker.internal:8100/v1
      # vLLM-metal embed server (--convert embed, vllm-migration-plan.md §7.7)
      # — a SEPARATE process/port from chat above, since vLLM serves one
      # model per process. Same reachability pattern.
      VLLM_EMBED_BASE_URL: http://host.docker.internal:8101/v1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Scoped, not a blanket `.:/app` — only docs/raw (source PDFs, needed
      # solely by the native/pre-Docker OCR step) is excluded. `make index`/
      # `reindex-full`/`recontextualize`/`backfill-*` all run scripts/
      # in-container via `docker compose exec app python scripts/...` for the
      # common case (this machine, moderate reindex), and build_index.py
      # reads BOTH docs/source/core AND docs/source/adventures to do that —
      # confirmed live, 2026-07-13: docs/source/core was missing from this
      # list, so build_index.py silently saw zero core docs in-container
      # while a --source-type core scoped run still ran its unconditional
      # "delete existing core rows" step, net-deleting all core rule_chunks
      # with nothing to replace them. Root cause was this list, not
      # build_index.py's logic — same class of bug as the scripts/ mount
      # gap below: an edit/config gap here silently diverges the container's
      # view of the repo from disk, with no error, just wrong/missing data.
      # scripts/ itself: confirmed live, 2026-07-12, with scripts/ NOT
      # mounted, those targets silently ran whatever copy of scripts/ was
      # baked into the image at the last `docker compose build`, so an
      # edited script never took effect without a full rebuild (surfaced as
      # writes silently landing nowhere during the ChromaDB->pgvector
      # migration — the script ran, reported success, but against stale,
      # pre-migration code). docs/source/adventures IS needed live too
      # (main.py/rules_store.py/world_prep.py read adventure .md +
      # _entities.json directly, not just through the rules index).
      - ./backend:/app/backend
      - ./scripts:/app/scripts
      - ./static:/app/static
      - ./templates:/app/templates
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./data:/app/data
      - ./docs/source/core:/app/docs/source/core
      - ./docs/source/adventures:/app/docs/source/adventures
      - ./tests:/app/tests                        # BDD-style tool-layer suite, see `make test`
      - ./pyproject.toml:/app/pyproject.toml       # pytest config (asyncio_mode, testpaths)
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir backend

volumes:
  postgres_data:
