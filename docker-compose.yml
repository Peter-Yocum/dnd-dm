services:
  db:
    image: postgres:16-alpine
    environment:
      # Local-dev-only credentials — this stack only ever binds to localhost.
      # Use real secrets (env vars / a secrets manager) for any non-local deploy.
      POSTGRES_DB: dnd_dm
      POSTGRES_USER: dnd_dm
      POSTGRES_PASSWORD: dnd_dm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dnd_dm"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://dnd_dm:dnd_dm@db:5432/dnd_dm
      # Reaches Ollama running on the host machine (Docker Desktop Mac/Windows).
      # On Linux: set OLLAMA_BASE_URL=http://172.17.0.1:11434 or use host network mode.
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Scoped, not a blanket `.:/app` — docs/raw (source PDFs) and
      # docs/source/core (OCR'd core-book markdown) are never read by
      # backend/ at runtime (only by the offline ingest scripts, which run
      # natively via .venv now, not through this container — see
      # docs/engineering-notes/nightly-ingestion-commands.md). Same for
      # scripts/. docs/source/adventures IS needed live (main.py/
      # rules_store.py/world_prep.py read adventure .md + _entities.json
      # directly, not just through the Chroma index).
      - ./backend:/app/backend
      - ./static:/app/static
      - ./templates:/app/templates
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./data:/app/data                          # chroma_db (+ its sqlite) and bm25 pickles
      - ./docs/source/adventures:/app/docs/source/adventures
      - ./tests:/app/tests                        # BDD-style tool-layer suite, see `make test`
      - ./pyproject.toml:/app/pyproject.toml       # pytest config (asyncio_mode, testpaths)
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir backend

volumes:
  postgres_data:
